    <style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    min-height:100vh;
}

/* Header */
header{
    background:#000000;
    border-bottom:3px solid #ff0000;
    text-align:center;
    padding:25px;
}

header h1{
    color:#ff3333;
    font-size:2.5rem;
    text-shadow:0 0 15px red;
}

header p{
    color:white;
    text-shadow:0 0 8px red;
    margin-top:10px;
}

/* Menu Section */
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding-top:450px;

    background:
    linear-gradient(
        rgba(0,0,0,0.75),
        rgba(20,0,0,0.75)
    ),
    url("f6a56921-2d4b-45dd-bf06-1b74544a6869.png");

    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    min-height:calc(100vh - 120px);
}

/* Cards */
.card{
    width:280px;
    background:rgba(15,15,15,0.95);
    border:2px solid #ff0000;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    color:white;
    box-shadow:0 0 15px rgba(255,0,0,0.5);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px rgba(255,0,0,0.9);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h2{
    color:#ff4444;
    margin:12px 0;
}

.card p{
    color:#dddddd;
    padding:0 15px;
}

.card h3{
    color:#ffcc00;
    margin:12px 0;
    font-size:22px;
}

/* Buttons */
.card button{
    background:#ff0000;
    color:white;
    border:none;
    padding:12px 25px;
    margin-bottom:15px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.card button:hover{
    background:#cc0000;
    box-shadow:0 0 15px red;
}
#menuDetails{
    width:90%;
    margin:30px auto;
    background:rgba(0,0,0,0.9);
    border:2px solid red;
    border-radius:15px;
    color:white;
    padding:20px;
    display:none;
}

#menuDetails h2{
    color:#ff4444;
    margin-bottom:15px;
}

#menuDetails ul{
    list-style:none;
}

#menuDetails li{
    padding:10px;
    border-bottom:1px solid #333;
}
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #333;
}

.item button{
    background:#ff0000;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

.item button:hover{
    background:#cc0000;
}
#cart{
    width:90%;
    margin:30px auto;
    padding:20px;
    background:#111;
    border:2px solid red;
    border-radius:15px;
    color:white;
}

#cart h2{
    color:#ff4444;
    margin-bottom:10px;
}

#cartItems{
    list-style:none;
}

#cartItems li{
    padding:10px;
    border-bottom:1px solid #333;
}

#total{
    color:#ffcc00;
}
#cart{
    width:90%;
    margin:30px auto;
    padding:20px;
    background:#111;
    border:2px solid red;
    border-radius:15px;
    color:white;
}

#cartItems{
    list-style:none;
    margin-top:15px;
}

#cartItems li{
    padding:10px;
    border-bottom:1px solid #333;
}

#orderBtn{
    background:red;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    margin-top:15px;
}
.arrow{
    display:block;
    color:#ffcc00;
    font-size:24px;
    margin-bottom:10px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(5px);
    }
}
</style>
</body>

}
let cart = [];
let total = 0;

function addToCart(name, price){

    cart.push({
        name:name,
        price:price
    });

    total += price;

    displayCart();
}

function displayCart(){

    let cartItems =
    document.getElementById("cartItems");

    cartItems.innerHTML = "";

    cart.forEach((item,index)=>{

        cartItems.innerHTML += `
        <li>
            ${item.name} - ₹${item.price}
            <button onclick="removeItem(${index})">
            ❌
            </button>
        </li>`;
    });

    document.getElementById("total")
    .innerText = total;
}

function removeItem(index){

    total -= cart[index].price;

    cart.splice(index,1);

    displayCart();
}

function placeOrder(){

    if(cart.length===0){
        alert("Cart is Empty!");
        return;
    }

    let orderText = "HotZone Order%0A";
    orderText += "Table No: 101%0A%0A";

    cart.forEach(item=>{
        orderText += item.name + " - ₹" + item.price + "%0A";
    });

    orderText += "%0ATotal: ₹" + total;

    window.location.href =
    "sms:+916381684020?body=" + orderText;
}
