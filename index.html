    box-sizing:border-box;

body{

/* Header */
header{

}

header h1{

}

header p{

/* Menu Section */
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding-top:450px;

    background:
    linear-gradient(
        rgba(0,0,0,0.75),
        rgba(20,0,0,0.75)
    ),

    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    min-height:calc(100vh - 120px);
}

/* Cards */
.card{
    width:280px;
    background:rgba(15,15,15,0.95);
    border:2px solid #ff0000;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    color:white;
    box-shadow:0 0 15px rgba(255,0,0,0.5);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px rgba(255,0,0,0.9);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h2{
    color:#ff4444;
    margin:12px 0;
}

.card p{
    color:#dddddd;
    padding:0 15px;
}

.card h3{
    color:#ffcc00;
    margin:12px 0;
    font-size:22px;
}

/* Buttons */
.card button{
    background:#ff0000;
    color:white;
    border:none;
    padding:12px 25px;
    margin-bottom:15px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.card button:hover{
    background:#cc0000;
    box-shadow:0 0 15px red;
}
#menuDetails{

    margin:30px auto;
    background:rgba(0,0,0,0.9);

}

#menuDetails h2{

    margin-bottom:15px;
}

#menuDetails ul{

}

#menuDetails li{

    border-bottom:1px solid #333;
}
.item{

    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #333;
}

.item button{

    border:none;

    border-radius:20px;
    cursor:pointer;
}

.item button:hover{

}
#cart{

    padding:20px;
    background:#111;
    border:2px solid red;
    border-radius:15px;
    color:white;
}

#cart h2{

}

#cartItems{

}

#cartItems li{

#total{

#cart{

}

@keyframes bounce{

let cart = [];
let total = 0;

function addToCart(name, price){

    cart.push({
        name:name,
        price:price
    });

    total += price;

    displayCart();
}

function displayCart(){

    let cartItems =
    document.getElementById("cartItems");

    cartItems.innerHTML = "";

    cart.forEach((item,index)=>{

        cartItems.innerHTML += `
        <li>
            ${item.name} - ₹${item.price}
            <button onclick="removeItem(${index})">
            ❌
            </button>
        </li>`;
    });

    document.getElementById("total")
    .innerText = total;
}

function removeItem(index){

    total -= cart[index].price;

    cart.splice(index,1);

    displayCart();
}

function generateOrderCode() {

    const STORAGE_KEY = "hotzone_order_codes";
    const THREE_HOURS = 3 * 60 * 60 * 1000;

    let usedCodes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const now = Date.now();

    usedCodes = usedCodes.filter(item => now - item.time < THREE_HOURS);

    let code;

    do {
        code = Math.floor(100 + Math.random() * 900).toString();
    } while (usedCodes.some(item => item.code === code));

    usedCodes.push({
        code: code,
        time: now
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(usedCodes));

    return code;
}

function placeOrder() {

    if (cart.length === 0) {
        alert("Cart is Empty!");
        return;
    }

    const customerName = document.getElementById("customerName").value.trim();

    if (customerName === "") {
        alert("Please enter your name.");
        return;
    }

    const orderCode = generateOrderCode();

    let orderText = "🔥 HotZone Order 🔥\n\n";
    orderText += "Order Code: #" + orderCode + "\n";
    orderText += "Customer Name: " + customerName + "\n\n";

    cart.forEach(item => {
        orderText += item.name + " - ₹" + item.price + "\n";
    });

    orderText += "\nTotal: ₹" + total;

    const whatsappNumber = "916381684020";

    window.open(
        "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(orderText),
        "_blank"
    );
}
